<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ffb703" />
  <title>Pogogy</title>
  <!-- Google Analytics (GA4) — traffic dashboard at analytics.google.com -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-8RDTJBKCWP"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-8RDTJBKCWP');
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css?v=11" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 62' fill='none' stroke-width='7' stroke-linecap='round'><path d='M8 55 A42 42 0 0 1 92 55' stroke='%23ff4d6d'/><path d='M16 55 A34 34 0 0 1 84 55' stroke='%23ff9f1c'/><path d='M24 55 A26 26 0 0 1 76 55' stroke='%23ffd60a'/><path d='M32 55 A18 18 0 0 1 68 55' stroke='%232ec4b6'/><path d='M40 55 A10 10 0 0 1 60 55' stroke='%233a86ff'/></svg>" />
</head>
<body>
  <canvas id="confetti"></canvas>

  <!-- GLOBAL SOUND / VOICE CONTROL (on every screen) -->
  <div id="soundDock" class="sound-dock">
    <select id="voiceSelectGlobal" class="dock-voice" aria-label="Choose voice" hidden></select>
    <button id="voiceFab" class="fab" title="Choose voice">🗣️</button>
    <button id="muteFab" class="fab" title="Sound on/off">🔊</button>
  </div>

  <!-- WELCOME / DAILY CHECK-IN -->
  <main id="welcome" class="screen active">
    <button id="welcomeHome" class="round-btn welcome-home" title="Go to home">🏠</button>
    <div class="welcome-card">
      <div id="welcomeEmoji" class="welcome-emoji">🌈</div>
      <h1 id="welcomeTitle" class="welcome-title">Welcome!</h1>
      <p id="welcomeSub" class="welcome-sub"></p>
      <div id="welcomeBody" class="welcome-body"></div>
    </div>
  </main>

  <!-- HOME SCREEN -->
  <main id="home" class="screen">
    <header class="topbar">
      <div class="hello">
        <span class="wave">👋</span>
        <span>Hi, <button id="nameBtn" class="name-pill" title="Tap to change name">Star</button>!</span>
      </div>
      <div class="top-right">
        <div class="score-pill" title="Stars earned today">⭐ <span id="todayStars">0</span></div>
        <button id="profileBtn" class="round-btn small" title="My profile">👤</button>
      </div>
    </header>

    <div class="hero">
      <div class="home-logo" aria-hidden="true">
        <svg viewBox="0 0 100 62" fill="none" stroke-width="6.5" stroke-linecap="round">
          <path d="M8 55 A42 42 0 0 1 92 55" stroke="#ff4d6d"/>
          <path d="M16 55 A34 34 0 0 1 84 55" stroke="#ff9f1c"/>
          <path d="M24 55 A26 26 0 0 1 76 55" stroke="#ffd60a"/>
          <path d="M32 55 A18 18 0 0 1 68 55" stroke="#2ec4b6"/>
          <path d="M40 55 A10 10 0 0 1 60 55" stroke="#3a86ff"/>
        </svg>
      </div>
      <h1 class="title">Pogogy</h1>
      <p class="subtitle">Pick a game to play 🎈</p>
      <p class="datechip">📅 <span id="dateLabel"></span> · New puzzles every day!</p>
    </div>

    <section class="tiles">
      <button class="tile t-daily" data-game="daily">
        <span class="tile-emoji">⭐</span>
        <span class="tile-name">Daily Play</span>
        <span class="tile-sub">Today's special set</span>
      </button>
      <button class="tile t-num" data-game="numbers">
        <span class="tile-emoji">🔢</span>
        <span class="tile-name">Numbers</span>
        <span class="tile-sub">Count & compare</span>
      </button>
      <button class="tile t-abc" data-game="alphabets">
        <span class="tile-emoji">🔤</span>
        <span class="tile-name">Alphabets</span>
        <span class="tile-sub">Letters & sounds</span>
      </button>
      <button class="tile t-add" data-game="addition">
        <span class="tile-emoji">➕</span>
        <span class="tile-name">Add Up</span>
        <span class="tile-sub">Counting & plus</span>
      </button>
      <button class="tile t-quiz" data-game="quiz">
        <span class="tile-emoji">🍎</span>
        <span class="tile-name">Fun Quiz</span>
        <span class="tile-sub">Animals & fruits</span>
      </button>
      <button class="tile t-logic" data-game="logic">
        <span class="tile-emoji">🧠</span>
        <span class="tile-name">Think & Code</span>
        <span class="tile-sub">Patterns & logic</span>
      </button>
      <button class="tile t-story" data-story="open">
        <span class="tile-emoji">📖</span>
        <span class="tile-name">Story Time</span>
        <span class="tile-sub">A tale with a moral</span>
      </button>
      <button class="tile t-memory" data-memory="open">
        <span class="tile-emoji">🧩</span>
        <span class="tile-name">Memory Match</span>
        <span class="tile-sub">Find the pairs!</span>
      </button>
    </section>

    <footer class="home-foot">
      <span class="made">Made with ❤️ for you</span>
    </footer>
  </main>

  <!-- PLAY SCREEN -->
  <main id="play" class="screen">
    <header class="play-top">
      <button id="backBtn" class="round-btn" title="Back home">🏠</button>
      <div class="progress"><div id="progressBar" class="progress-fill"></div></div>
      <div class="play-stars">⭐ <span id="playStars">0</span></div>
    </header>

    <div class="qcard">
      <button id="speakBtn" class="speak-btn" title="Hear the question">🔊</button>
      <h2 id="qPrompt" class="q-prompt">Ready?</h2>
      <div id="qDisplay" class="q-display"></div>
      <div id="qOptions" class="q-options"></div>
    </div>

    <div id="feedback" class="feedback"></div>
  </main>

  <!-- STORY SCREEN -->
  <main id="story" class="screen">
    <header class="play-top">
      <button id="storyHome" class="round-btn" title="Back home">🏠</button>
      <div class="progress"><div id="storyBar" class="progress-fill"></div></div>
      <button id="storySpeak" class="round-btn" title="Hear it again">🔊</button>
    </header>

    <div class="story-card">
      <h2 id="storyTitle" class="story-title"></h2>
      <div id="storyScene" class="story-scene"></div>
      <p id="storyText" class="story-text"></p>
    </div>

    <div class="story-nav">
      <button id="storyPrev" class="big-btn story-prev">◀ Back</button>
      <button id="storyNext" class="big-btn story-next">Next ▶</button>
    </div>
  </main>

  <!-- MEMORY MATCH SCREEN -->
  <main id="memory" class="screen">
    <header class="play-top">
      <button id="memHome" class="round-btn" title="Back home">🏠</button>
      <div class="mem-info">🧩 Pairs found: <span id="memPairs">0/6</span></div>
      <button id="memNew" class="round-btn" title="New game">🔄</button>
    </header>
    <div id="memGrid" class="mem-grid"></div>
    <div id="memFeedback" class="feedback"></div>
  </main>

  <!-- PROFILE SCREEN -->
  <main id="profile" class="screen">
    <header class="play-top">
      <button id="profileHome" class="round-btn" title="Back home">🏠</button>
      <div class="mem-info">👤 My Profile</div>
      <span style="width:54px"></span>
    </header>
    <div class="profile-card">
      <img id="profilePhoto" class="profile-photo" alt="" hidden />
      <div id="profileAvatar" class="profile-avatar">🧒</div>
      <h1 id="profileName" class="profile-name">Little Star</h1>
      <p id="profileSchool" class="profile-school"></p>
      <p id="profileEmail" class="profile-email"></p>
      <div class="profile-stats">
        <div class="stat"><div class="stat-num" id="statTotal">0</div><div class="stat-label">⭐ Total Stars</div></div>
        <div class="stat"><div class="stat-num" id="statToday">0</div><div class="stat-label">🌟 Today</div></div>
        <div class="stat"><div class="stat-num" id="statBadge">🌱</div><div class="stat-label">🏅 Level</div></div>
      </div>
      <div id="profileSignedOutNote" class="welcome-note" hidden>Playing as a guest — sign in to save your stars across devices.</div>
      <div class="profile-actions">
        <button id="profileSignIn" class="big-btn go-home" hidden>🔵 Sign in with Google</button>
        <button id="profileSignOut" class="big-btn play-again" hidden>👋 Sign out</button>
      </div>
    </div>
  </main>

  <!-- DONE SCREEN -->
  <main id="done" class="screen">
    <div class="done-card">
      <div class="trophy">🏆</div>
      <h1 id="doneTitle">Awesome!</h1>
      <p id="doneMsg" class="done-msg"></p>
      <div class="star-row" id="starRow"></div>
      <div class="done-btns">
        <button id="againBtn" class="big-btn play-again">▶️ Play Again</button>
        <button id="homeBtn" class="big-btn go-home">🏠 Home</button>
      </div>
    </div>
  </main>

  <!-- Firebase (compat SDK) for Google login + cloud profile/points -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script src="js/config.js?v=9"></script>
  <script src="js/rng.js?v=9"></script>
  <script src="js/content.js?v=9"></script>
  <script src="js/stories.js?v=9"></script>
  <script src="js/generators.js?v=9"></script>
  <script src="js/app.js?v=13"></script>
</body>
</html>
